<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Wenjia Wang's terminal-style portfolio for trustworthy AI, cybersecurity, and computer science education."
    >
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="shortcut icon" href="assets/icons/favicon.svg">
    <title>Wenjia Wang | Terminal Portfolio</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --panel: #101010;
        --text: #cfcfcf;
        --muted: #626262;
        --soft: #8f8f8f;
        --bright: #ededed;
        --link: #b8b8b8;
        --live: #e05b22;
        --accent: #a87592;
        --divider: rgba(255, 255, 255, 0.11);
        --selection: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 76% 78%, rgba(255, 255, 255, 0.035), transparent 26rem),
          var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        letter-spacing: 0;
      }

      ::selection {
        background: var(--selection);
      }

      a {
        color: var(--link);
        text-decoration-color: rgba(255, 255, 255, 0.34);
        text-underline-offset: 0.2em;
        transition: color 160ms ease, text-decoration-color 160ms ease;
      }

      a:hover {
        color: var(--bright);
        text-decoration-color: rgba(255, 255, 255, 0.82);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 100vh;
        isolation: isolate;
      }

      .terminal {
        width: min(100%, 720px);
        min-height: 100vh;
        justify-self: end;
        padding: 66px 54px 44px;
        border-right: 1px solid var(--divider);
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 22px;
        margin-bottom: 42px;
        color: #404040;
        font-size: 14px;
        font-weight: 600;
      }

      .dot {
        width: 13px;
        height: 13px;
        border: 2px solid #555;
        display: inline-block;
      }

      .dot + .dot {
        margin-left: -4px;
      }

      .session-label {
        margin-left: 12px;
      }

      .terminal-scroll {
        flex: 1;
        overflow-y: auto;
        padding-right: 10px;
        scrollbar-width: thin;
        scrollbar-color: #2d2d2d transparent;
      }

      .terminal-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #2d2d2d;
      }

      .block {
        margin: 0 0 24px;
      }

      .command-line,
      .output-line,
      .note-line {
        min-height: 1.55em;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .command-line {
        color: var(--bright);
        font-weight: 700;
      }

      .prompt {
        color: var(--soft);
        margin-right: 8px;
        font-weight: 500;
      }

      .prefix {
        color: var(--soft);
        margin-right: 8px;
      }

      .output-line {
        color: var(--soft);
        font-weight: 600;
      }

      .output-line strong {
        color: var(--text);
        font-weight: 700;
      }

      .output-line .live {
        color: var(--live);
        font-weight: 700;
      }

      .output-line .soon,
      .output-line .tag {
        color: var(--accent);
        font-weight: 700;
      }

      .note-line {
        color: #565656;
        font-style: italic;
        font-weight: 600;
      }

      .typing-cursor::after,
      .input-shell::after {
        content: "";
        display: inline-block;
        width: 0.62em;
        height: 1.05em;
        margin-left: 4px;
        transform: translateY(0.18em);
        background: rgba(255, 255, 255, 0.72);
        animation: blink 0.9s steps(2, start) infinite;
      }

      .input-shell {
        display: flex;
        align-items: center;
        min-height: 34px;
        margin-top: 16px;
        color: var(--bright);
        font-weight: 700;
      }

      .input-shell:focus-within::after {
        display: none;
      }

      .input-shell input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        padding: 0;
        background: transparent;
        color: var(--bright);
        caret-color: var(--bright);
        font: inherit;
        font-weight: 700;
      }

      .input-shell input::placeholder {
        color: #4c4c4c;
      }

      .portrait {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.012), transparent 16%),
          var(--bg);
      }

      .portrait-grid {
        position: absolute;
        inset: 0;
        opacity: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: radial-gradient(circle at 52% 70%, black, transparent 57%);
        pointer-events: none;
      }

      .portrait-hint {
        position: absolute;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%);
        color: #343434;
        font-size: 13px;
        font-style: italic;
        font-weight: 700;
        white-space: nowrap;
        pointer-events: none;
      }

      .portrait-canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(76%, 800px);
        height: auto;
        cursor: crosshair;
        opacity: 0.9;
        filter: drop-shadow(0 0 22px rgba(104, 210, 255, 0.12));
        transition: color 180ms ease, opacity 180ms ease, filter 180ms ease;
      }

      .portrait:hover .portrait-canvas {
        opacity: 1;
        filter:
          saturate(1.22)
          contrast(1.14)
          brightness(1.08)
          drop-shadow(0 0 30px rgba(255, 78, 205, 0.18));
      }

      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent,
          transparent 49%,
          rgba(255, 255, 255, 0.018) 50%,
          transparent 51%,
          transparent
        );
        background-size: 100% 7px;
        mix-blend-mode: screen;
        opacity: 0.65;
        pointer-events: none;
      }

      .noise {
        position: absolute;
        inset: -80px;
        opacity: 0.01;
        background-image:
          repeating-radial-gradient(circle at 10% 20%, #fff 0 1px, transparent 1px 4px),
          repeating-radial-gradient(circle at 80% 70%, #fff 0 1px, transparent 1px 5px);
        animation: drift 18s linear infinite;
        pointer-events: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes blink {
        0%,
        45% {
          opacity: 1;
        }
        46%,
        100% {
          opacity: 0;
        }
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-48px, 32px, 0);
        }
      }

      @media (max-width: 980px) {
        body {
          overflow-y: auto;
        }

        .layout {
          display: flex;
          min-height: 100vh;
          flex-direction: column;
        }

        .terminal {
          width: 100%;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--divider);
          padding: 40px 26px 30px;
        }

        .portrait {
          min-height: 58vh;
        }

        .portrait-canvas {
          width: min(82%, 680px);
        }
      }

      @media (max-width: 560px) {
        body {
          font-size: 14px;
        }

        .terminal {
          padding: 28px 18px 24px;
        }

        .terminal-header {
          margin-bottom: 30px;
          font-size: 12px;
        }

        .dot {
          width: 11px;
          height: 11px;
        }

        .block {
          margin-bottom: 20px;
        }

        .portrait {
          min-height: 50vh;
        }

        .portrait-canvas {
          width: min(88%, 520px);
        }
      }
    </style>
  </head>

          for (let i = 0; i < portraitLevels.length; i += 1) {
            const level = portraitLevels[i];
            if (level === 0) continue;

            const x = i % PORTRAIT_COLS;
            const y = Math.floor(i / PORTRAIT_COLS);
            const px = (x + 0.5) * CELL_W + rowShift[y];
            const py = (y + 0.5) * CELL_H;
            const dx = px - mouseX;
            const dy = py - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const threshold = hoverRadius * (0.42 + cellNoise[i] * 0.58);
            const inHover = pointer.active && dist < threshold;
            const alpha = OPACITY[level];
            const charset = RAMP[level];

            let glyph = baseGlyphs[i];
            if (inHover && mouseMoving && rng() < 0.05) {
              const roughLevel = Math.max(1, Math.min(10, level + Math.floor((rng() - 0.5) * 4)));
              const roughSet = RAMP[roughLevel];
              glyph = roughSet[Math.floor(rng() * roughSet.length)];
              baseGlyphs[i] = glyph;
            } else if ((portraitFrame + flickerPhase[i]) % flickerInterval[i] === 0) {
              glyph = charset[Math.floor(rng() * charset.length)];
              baseGlyphs[i] = glyph;
            }

            const featureBoost = level >= 9 ? 1 : 0.9;
            const hoverBoost = inHover || colorPulse > 0 ? 1.16 : 1;
            portraitContext.fillStyle = portraitColor(level, x, y, alpha * featureBoost * hoverBoost, inHover);

            let jitterY = 0;
            if (inHover && mouseMoving && rng() < 0.16) {
              jitterY = (rng() < 0.5 ? -1 : 1) * (1 + Math.floor(cellNoise[i] * 6));
            }

            portraitContext.fillText(glyph, px, py + jitterY);

            if (inHover && mouseMoving) {
              const push = 5 * (1 - dist / threshold);
              const ghostX = Math.max(-16, Math.min(16, (mouseX - prevMouseX) * push * 0.45));
              const ghostY = Math.max(-16, Math.min(16, (mouseY - prevMouseY) * push * 0.45));
              portraitContext.fillText(glyph, px + ghostX, py + jitterY + ghostY);
            }
          }

          if (colorPulse > 0) colorPulse -= 1;
          prevMouseX = mouseX;
          prevMouseY = mouseY;
          window.requestAnimationFrame(renderPortrait);
        }

        function setupPortrait() {
          resizePortrait();
          renderPortrait();

          portraitCanvas.addEventListener("pointermove", (event) => {
            const bounds = portraitCanvas.getBoundingClientRect();
            const baseW = PORTRAIT_COLS * CELL_W;
            const baseH = PORTRAIT_ROWS * CELL_H;
            mouseX = (event.clientX - bounds.left) * (baseW / bounds.width);
            mouseY = (event.clientY - bounds.top) * (baseH / bounds.height);
            pointer = {
              active: true,
              x: mouseX / baseW,
              y: mouseY / baseH
            };
          });

          portraitCanvas.addEventListener("pointerleave", () => {
            pointer.active = false;
            mouseX = -1000;
            mouseY = -1000;
            prevMouseX = -1000;
            prevMouseY = -1000;
          });

          portraitCanvas.addEventListener("click", () => {
            colorPulse = 180;
          });

          window.addEventListener("resize", resizePortrait);
        }

        setupTerminalInput();
        setupPortrait();
        bootTerminal();
      })();
    </script>
  </body>
</html>
