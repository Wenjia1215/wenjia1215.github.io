<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Terminal-style personal website for Wenjia Wang, a Computer Science Ph.D. candidate working across trustworthy AI, cybersecurity, compliance, and CS education.">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="shortcut icon" href="assets/icons/favicon.svg">
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="assets/css/site.css">
    <script defer src="assets/js/site.js"></script>
    <title>Wenjia Wang | Terminal Portfolio</title>
  </head>
  <body>
    <main class="terminal-shell" id="main-content">
      <section class="terminal-pane" aria-label="Interactive profile terminal">
        <div class="session-bar" aria-hidden="true">
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span class="session-version">session v3.0 · wenjia@portfolio</span>
        </div>

        <div class="terminal-log" id="terminalLog" aria-live="polite"></div>

        <form class="terminal-form" id="terminalForm" autocomplete="off">
          <label class="sr-only" for="terminalInput">Type a command</label>
          <span class="terminal-prompt">~$</span>
          <input id="terminalInput" name="command" type="text" spellcheck="false" placeholder="try: help, about, work, links, contact">
        </form>
      </section>

      <aside class="portrait-pane" aria-label="Digital portrait">
        <div class="portrait-meta">
          <span>ascii face render</span>
          <span>source: teaching-bg.png</span>
        </div>
        <div class="portrait-stage">
          <div class="number-rain" id="numberRain" aria-hidden="true"></div>
          <pre class="ascii-face" id="asciiFace" aria-label="ASCII portrait of Wenjia Wang">loading portrait...</pre>
        </div>
        <canvas id="portraitCanvas" hidden></canvas>
        <div class="portrait-footer" aria-hidden="true">
          <span>trustworthy-ai</span>
          <span>cybersecurity</span>
          <span>cs-education</span>
        </div>
      </aside>
    </main>
  </body>
</html>
