<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Wenjia Wang's terminal-style portfolio for trustworthy AI, cybersecurity, and computer science education."
    >
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="shortcut icon" href="assets/icons/favicon.svg">
    <title>Wenjia Wang | Terminal Portfolio</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --panel: #101010;
        --text: #cfcfcf;
        --muted: #626262;
        --soft: #8f8f8f;
        --bright: #ededed;
        --link: #b8b8b8;
        --live: #e05b22;
        --accent: #a87592;
        --divider: rgba(255, 255, 255, 0.11);
        --selection: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 76% 78%, rgba(255, 255, 255, 0.035), transparent 26rem),
          var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        letter-spacing: 0;
      }

      ::selection {
        background: var(--selection);
      }

      a {
        color: var(--link);
        text-decoration-color: rgba(255, 255, 255, 0.34);
        text-underline-offset: 0.2em;
        transition: color 160ms ease, text-decoration-color 160ms ease;
      }

      a:hover {
        color: var(--bright);
        text-decoration-color: rgba(255, 255, 255, 0.82);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 100vh;
        isolation: isolate;
      }

      .terminal {
        width: min(100%, 720px);
        min-height: 100vh;
        justify-self: end;
        padding: 66px 54px 44px;
        border-right: 1px solid var(--divider);
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 22px;
        margin-bottom: 42px;
        color: #404040;
        font-size: 14px;
        font-weight: 600;
      }

      .dot {
        width: 13px;
        height: 13px;
        border: 2px solid #555;
        display: inline-block;
      }

      .dot + .dot {
        margin-left: -4px;
      }

      .session-label {
        margin-left: 12px;
      }

      .terminal-scroll {
        flex: 1;
        overflow-y: auto;
        padding-right: 10px;
        scrollbar-width: thin;
        scrollbar-color: #2d2d2d transparent;
      }

      .terminal-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #2d2d2d;
      }

      .block {
        margin: 0 0 24px;
      }

      .command-line,
      .output-line,
      .note-line {
        min-height: 1.55em;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .command-line {
        color: var(--bright);
        font-weight: 700;
      }

      .prompt {
        color: var(--soft);
        margin-right: 8px;
        font-weight: 500;
      }

      .prefix {
        color: var(--soft);
        margin-right: 8px;
      }

      .output-line {
        color: var(--soft);
        font-weight: 600;
      }

      .output-line strong {
        color: var(--text);
        font-weight: 700;
      }

      .output-line .live {
        color: var(--live);
        font-weight: 700;
      }

      .output-line .soon,
      .output-line .tag {
        color: var(--accent);
        font-weight: 700;
      }

      .note-line {
        color: #565656;
        font-style: italic;
        font-weight: 600;
      }

      .typing-cursor::after,
      .input-shell::after {
        content: "";
        display: inline-block;
        width: 0.62em;
        height: 1.05em;
        margin-left: 4px;
        transform: translateY(0.18em);
        background: rgba(255, 255, 255, 0.72);
        animation: blink 0.9s steps(2, start) infinite;
      }

      .input-shell {
        display: flex;
        align-items: center;
        min-height: 34px;
        margin-top: 16px;
        color: var(--bright);
        font-weight: 700;
      }

      .input-shell:focus-within::after {
        display: none;
      }

      .input-shell input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        padding: 0;
        background: transparent;
        color: var(--bright);
        caret-color: var(--bright);
        font: inherit;
        font-weight: 700;
      }

      .input-shell input::placeholder {
        color: #4c4c4c;
      }

      .portrait {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.012), transparent 16%),
          var(--bg);
      }

      .portrait-grid {
        position: absolute;
        inset: 0;
        opacity: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: radial-gradient(circle at 52% 70%, black, transparent 57%);
        pointer-events: none;
      }

      .portrait-hint {
        position: absolute;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%);
        color: #343434;
        font-size: 13px;
        font-style: italic;
        font-weight: 700;
        white-space: nowrap;
        pointer-events: none;
      }

      .portrait-canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(76%, 800px);
        height: auto;
        cursor: crosshair;
        opacity: 0.78;
        transition: color 180ms ease, opacity 180ms ease, filter 180ms ease;
      }

      .portrait:hover .portrait-canvas {
        opacity: 0.96;
        filter: contrast(1.12) brightness(1.08);
      }

      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent,
          transparent 49%,
          rgba(255, 255, 255, 0.018) 50%,
          transparent 51%,
          transparent
        );
        background-size: 100% 7px;
        mix-blend-mode: screen;
        opacity: 0.65;
        pointer-events: none;
      }

      .noise {
        position: absolute;
        inset: -80px;
        opacity: 0.01;
        background-image:
          repeating-radial-gradient(circle at 10% 20%, #fff 0 1px, transparent 1px 4px),
          repeating-radial-gradient(circle at 80% 70%, #fff 0 1px, transparent 1px 5px);
        animation: drift 18s linear infinite;
        pointer-events: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes blink {
        0%,
        45% {
          opacity: 1;
        }
        46%,
        100% {
          opacity: 0;
        }
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-48px, 32px, 0);
        }
      }

      @media (max-width: 980px) {
        body {
          overflow-y: auto;
        }

        .layout {
          display: flex;
          min-height: 100vh;
          flex-direction: column;
        }

        .terminal {
          width: 100%;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--divider);
          padding: 40px 26px 30px;
        }

        .portrait {
          min-height: 58vh;
        }

        .portrait-canvas {
          width: min(82%, 680px);
        }
      }

      @media (max-width: 560px) {
        body {
          font-size: 14px;
        }

        .terminal {
          padding: 28px 18px 24px;
        }

        .terminal-header {
          margin-bottom: 30px;
          font-size: 12px;
        }

        .dot {
          width: 11px;
          height: 11px;
        }

        .block {
          margin-bottom: 20px;
        }

        .portrait {
          min-height: 50vh;
        }

        .portrait-canvas {
          width: min(88%, 520px);
        }
      }
    </style>
  </head>

        const aliases = {
          "?": "help",
          "cat about.txt": "about",
          "cat research.txt": "research",
          "cat teaching.txt": "teaching",
          "ls": "help",
          "ls research": "research",

          "ls teaching": "teaching",

          "github": "links",

          "youtube": "links",
          "llm": "chat"
        };

        let portraitFrame = 0;
        let pointer = { active: false, x: 0.5, y: 0.5 };
        let mouseX = -1000;
        let mouseY = -1000;
        let prevMouseX = -1000;
        let prevMouseY = -1000;
        let colorPulse = 0;

        const PORTRAIT_COLS = 166;
        const PORTRAIT_ROWS = portraitRows.length;
        const CELL_W = 4.8;
        const CELL_H = 11;
        const FONT_SIZE = 8;
        const RAMP = [
          " ",
          "..",
          ",:;-",
          "~=+!?",
          "/\\|<>{}[]",
          "cvxznrst",
          "oaepqdbgu",
          "AXYZSRG094",
          "OWQB$&#%86",
          "@#MW$%&B08",
          "@#$%&WMB8N"
        ];
        const OPACITY = [0, 0.18, 0.25, 0.32, 0.45, 0.56, 0.68, 0.78, 0.88, 0.95, 1];

        const rng = (() => {
          let seed = 1215;
          return () => {
            seed = (seed * 1664525 + 1013904223) >>> 0;
            return seed / 0xFFFFFFFF;
          };
        })();

        const portraitLevels = portraitRows.join("").split("").map((value) => {
          if (value === "A") return 10;
          return Number.parseInt(value, 10) || 0;
        });
        const baseGlyphs = portraitLevels.map((level) => {
          const charset = RAMP[level] || " ";
          return charset === " " ? " " : charset[Math.floor(rng() * charset.length)];
        });
        const cellNoise = portraitLevels.map(() => rng());
        const rowNoise = Array.from({ length: PORTRAIT_ROWS }, () => rng());
        const flickerPhase = portraitLevels.map(() => Math.floor(rng() * 500));
        const flickerInterval = portraitLevels.map(() => 260 + Math.floor(rng() * 760));

        function delay(ms) {
          return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function escapeHtml(value) {
          return value
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
        }

        function scrollToBottom() {
          terminalScroll.scrollTop = terminalScroll.scrollHeight;
        }

        function createBlock() {
          const block = document.createElement("div");
          block.className = "block";
          terminalLog.append(block);
          return block;
        }

        async function typeCommand(text) {
          const block = createBlock();
          const line = document.createElement("div");
          const command = document.createElement("span");
          line.className = "command-line typing-cursor";
          line.innerHTML = "<span class=\"prompt\">~$</span>";
          line.append(command);
          block.append(line);

          for (let index = 0; index <= text.length; index += 1) {
            command.textContent = text.slice(0, index);
            scrollToBottom();
            await delay(index === 0 ? 90 : 12 + Math.random() * 26);
          }

          line.classList.remove("typing-cursor");
          return block;
        }

        function appendOutput(block, line, html = false) {
          const output = document.createElement("div");
          output.className = "output-line";
          if (line === "") {
            output.innerHTML = "<span class=\"prefix\">&gt;</span>";
          } else {
            output.innerHTML = `<span class="prefix">&gt;</span>${html ? line : escapeHtml(line)}`;
          }
          block.append(output);
        }

        function appendNote(lines) {
          const block = createBlock();
          for (const line of lines) {
            const note = document.createElement("div");
            note.className = "note-line";
            note.textContent = line;
            block.append(note);
          }
        }

        async function bootTerminal() {
          commandInput.disabled = true;

          for (const entry of bootLines) {
            if (entry.kind === "spacer") {
              await delay(130);
              continue;
            }

            if (entry.kind === "command") {
              await typeCommand(entry.text);
              continue;
            }

            if (entry.kind === "note") {
              appendNote(entry.lines);
              await delay(180);
              continue;
            }

            const block = terminalLog.lastElementChild || createBlock();
            for (const line of entry.lines) {
              appendOutput(block, line, entry.html);
              scrollToBottom();
              await delay(42);
            }
          }

          commandInput.disabled = false;
          commandInput.focus({ preventScroll: true });

          const queuedCommand = new URLSearchParams(window.location.search).get("command");
          if (queuedCommand) {
            await delay(180);
            runCommand(queuedCommand);
          }
        }

        function normalizeCommand(raw) {
          return raw.trim().replace(/\s+/g, " ");
        }

        function runCommand(raw) {
          const command = normalizeCommand(raw);
          if (!command) return;

          if (command.toLowerCase() === "clear") {
            terminalLog.textContent = "";
            scrollToBottom();
            return;
          }

          const lower = command.toLowerCase();
          const key = aliases[command] || aliases[lower] || lower;
          const block = createBlock();
          const commandLine = document.createElement("div");
          commandLine.className = "command-line";
          commandLine.innerHTML = `<span class="prompt">~$</span>${escapeHtml(command)}`;
          block.append(commandLine);

          const output = replies[key] || [
            `command not found: ${escapeHtml(command)}`,
            "try `help` for available commands."
          ];

          for (const line of output) {
            appendOutput(block, line, true);
          }

          scrollToBottom();
        }

        function setupTerminalInput() {
          commandForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const command = commandInput.value;
            commandInput.value = "";
            runCommand(command);
          });

          document.addEventListener("keydown", (event) => {
            if (event.metaKey || event.ctrlKey || event.altKey) return;
            if (document.activeElement === commandInput) return;
            if (event.key.length === 1 || event.key === "/") {
              commandInput.focus();
            }
          });
        }

        function resizePortrait() {
          const ratio = window.devicePixelRatio || 1;
          const baseW = PORTRAIT_COLS * CELL_W;
          const baseH = PORTRAIT_ROWS * CELL_H;
          const bounds = portraitStage.getBoundingClientRect();
          const fit = Math.min(1, (bounds.width * 0.78) / baseW, (bounds.height * 0.78) / baseH);

          portraitCanvas.width = Math.ceil(baseW * ratio);
          portraitCanvas.height = Math.ceil(baseH * ratio);
          portraitCanvas.style.width = `${Math.round(baseW * fit)}px`;
          portraitCanvas.style.height = `${Math.round(baseH * fit)}px`;
          portraitContext.setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function portraitColor(level, x, y, alpha) {
          const cyan = 128 + level * 8 + Math.sin((x + portraitFrame) * 0.08) * 18;
          const magenta = 106 + level * 5 + Math.cos((y - portraitFrame) * 0.06) * 16;
          const warm = 118 + level * 7;
          return `rgba(${Math.round(warm)}, ${Math.round(cyan)}, ${Math.round(magenta + 42)}, ${alpha})`;
        }

        function renderPortrait() {
          portraitFrame += 1;
          const baseW = PORTRAIT_COLS * CELL_W;
          const baseH = PORTRAIT_ROWS * CELL_H;
          portraitContext.clearRect(0, 0, baseW, baseH);
          portraitContext.font = `400 ${FONT_SIZE}px "JetBrains Mono", monospace`;
          portraitContext.textAlign = "center";
          portraitContext.textBaseline = "middle";

          const mouseMoving = Math.abs(mouseX - prevMouseX) + Math.abs(mouseY - prevMouseY) > 0.5;
          const rowShift = new Float32Array(PORTRAIT_ROWS);
          const hoverRadius = 68;

          for (let row = 0; row < PORTRAIT_ROWS; row += 1) {
            if (!pointer.active || !mouseMoving) continue;
            const rowCenterY = (row + 0.5) * CELL_H;
            const dist = Math.abs(rowCenterY - mouseY);
            if (dist > hoverRadius * 0.72) continue;
            const strength = (1 - dist / (hoverRadius * 0.72)) * (0.35 + rowNoise[row] * 0.65);
            rowShift[row] = Math.max(-14, Math.min(14, (mouseX - prevMouseX) * strength * 1.8));
          }

          for (let i = 0; i < portraitLevels.length; i += 1) {
            const level = portraitLevels[i];
            if (level === 0) continue;

            const x = i % PORTRAIT_COLS;
            const y = Math.floor(i / PORTRAIT_COLS);
            const px = (x + 0.5) * CELL_W + rowShift[y];
            const py = (y + 0.5) * CELL_H;
            const dx = px - mouseX;
            const dy = py - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const threshold = hoverRadius * (0.42 + cellNoise[i] * 0.58);
            const inHover = pointer.active && dist < threshold;
            const alpha = OPACITY[level];
            const charset = RAMP[level];

            let glyph = baseGlyphs[i];
            if (inHover && mouseMoving && rng() < 0.05) {
              const roughLevel = Math.max(1, Math.min(10, level + Math.floor((rng() - 0.5) * 4)));
              const roughSet = RAMP[roughLevel];
              glyph = roughSet[Math.floor(rng() * roughSet.length)];
              baseGlyphs[i] = glyph;
            } else if ((portraitFrame + flickerPhase[i]) % flickerInterval[i] === 0) {
              glyph = charset[Math.floor(rng() * charset.length)];
              baseGlyphs[i] = glyph;
            }

            const useColor = inHover || colorPulse > 0;
            portraitContext.fillStyle = useColor
              ? portraitColor(level, x, y, alpha)
              : `rgba(212, 212, 212, ${alpha})`;

            let jitterY = 0;
            if (inHover && mouseMoving && rng() < 0.16) {
              jitterY = (rng() < 0.5 ? -1 : 1) * (1 + Math.floor(cellNoise[i] * 6));
            }

            portraitContext.fillText(glyph, px, py + jitterY);

            if (inHover && mouseMoving) {
              const push = 5 * (1 - dist / threshold);
              const ghostX = Math.max(-16, Math.min(16, (mouseX - prevMouseX) * push * 0.45));
              const ghostY = Math.max(-16, Math.min(16, (mouseY - prevMouseY) * push * 0.45));
              portraitContext.fillText(glyph, px + ghostX, py + jitterY + ghostY);
            }
          }

          if (colorPulse > 0) colorPulse -= 1;
          prevMouseX = mouseX;
          prevMouseY = mouseY;
          window.requestAnimationFrame(renderPortrait);
        }

        function setupPortrait() {
          resizePortrait();
          renderPortrait();

          portraitCanvas.addEventListener("pointermove", (event) => {
            const bounds = portraitCanvas.getBoundingClientRect();
            const baseW = PORTRAIT_COLS * CELL_W;
            const baseH = PORTRAIT_ROWS * CELL_H;
            mouseX = (event.clientX - bounds.left) * (baseW / bounds.width);
            mouseY = (event.clientY - bounds.top) * (baseH / bounds.height);
            pointer = {
              active: true,
              x: mouseX / baseW,
              y: mouseY / baseH
            };
          });

          portraitCanvas.addEventListener("pointerleave", () => {
            pointer.active = false;
            mouseX = -1000;
            mouseY = -1000;
            prevMouseX = -1000;
            prevMouseY = -1000;
          });

          portraitCanvas.addEventListener("click", () => {
            colorPulse = 180;
          });

          window.addEventListener("resize", resizePortrait);
        }

        setupTerminalInput();
        setupPortrait();
        bootTerminal();
      })();
