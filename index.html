    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --panel: #101010;
        --text: #cfcfcf;
        --muted: #626262;
        --soft: #8f8f8f;
        --bright: #ededed;
        --link: #b8b8b8;
        --live: #e05b22;
        --accent: #a87592;
        --divider: rgba(255, 255, 255, 0.11);
        --selection: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 76% 78%, rgba(255, 255, 255, 0.035), transparent 26rem),
          var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        letter-spacing: 0;
      }

      ::selection {
        background: var(--selection);
      }

      a {
        color: var(--link);
        text-decoration-color: rgba(255, 255, 255, 0.34);
        text-underline-offset: 0.2em;
        transition: color 160ms ease, text-decoration-color 160ms ease;
      }

      a:hover {
        color: var(--bright);
        text-decoration-color: rgba(255, 255, 255, 0.82);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 100vh;
        isolation: isolate;
      }

      .terminal {
        width: min(100%, 720px);
        min-height: 100vh;
        justify-self: end;
        padding: 66px 54px 44px;
        border-right: 1px solid var(--divider);
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 22px;
        margin-bottom: 42px;
        color: #404040;
        font-size: 14px;
        font-weight: 600;
      }

      .dot {
        width: 13px;
        height: 13px;
        border: 2px solid #555;
        display: inline-block;
      }

      .dot + .dot {
        margin-left: -4px;
      }

      .session-label {
        margin-left: 12px;
      }

      .terminal-scroll {
        flex: 1;
        overflow-y: auto;
        padding-right: 10px;
        scrollbar-width: thin;
        scrollbar-color: #2d2d2d transparent;
      }

      .terminal-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #2d2d2d;
      }

      .block {
        margin: 0 0 24px;
      }

      .command-line,
      .output-line,
      .note-line {
        min-height: 1.55em;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .command-line {
        color: var(--bright);
        font-weight: 700;
      }

      .prompt {
        color: var(--soft);
        margin-right: 8px;
        font-weight: 500;
      }

      .prefix {
        color: var(--soft);
        margin-right: 8px;
      }

      .output-line {
        color: var(--soft);
        font-weight: 600;
      }

      .output-line strong {
        color: var(--text);
        font-weight: 700;
      }

      .output-line .live {
        color: var(--live);
        font-weight: 700;
      }

      .output-line .soon,
      .output-line .tag {
        color: var(--accent);
        font-weight: 700;
      }

      .note-line {
        color: #565656;
        font-style: italic;
        font-weight: 600;
      }

      .typing-cursor::after,
      .input-shell::after {
        content: "";
        display: inline-block;
        width: 0.62em;
        height: 1.05em;
        margin-left: 4px;
        transform: translateY(0.18em);
        background: rgba(255, 255, 255, 0.72);
        animation: blink 0.9s steps(2, start) infinite;
      }

      .input-shell {
        display: flex;
        align-items: center;
        min-height: 34px;
        margin-top: 16px;
        color: var(--bright);
        font-weight: 700;
      }

      .input-shell:focus-within::after {
        display: none;
      }

      .input-shell input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        padding: 0;
        background: transparent;
        color: var(--bright);
        caret-color: var(--bright);
        font: inherit;
        font-weight: 700;
      }

      .input-shell input::placeholder {
        color: #4c4c4c;
      }

      .portrait {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.012), transparent 16%),
          var(--bg);
      }

      .portrait-grid {
        position: absolute;
        inset: 0;
        opacity: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: radial-gradient(circle at 52% 70%, black, transparent 57%);
        pointer-events: none;
      }

      .portrait-hint {
        position: absolute;
        left: 50%;
        bottom: 34px;
        transform: translateX(-50%);
        color: #343434;
        font-size: 13px;
        font-style: italic;
        font-weight: 700;
        white-space: nowrap;
        pointer-events: none;
      }

      .portrait-output {
        position: absolute;
        left: 50%;
        bottom: clamp(88px, 8vh, 126px);
        transform: translateX(-50%);
        margin: 0;
        color: #737373;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: clamp(5.4px, 0.43vw, 7.3px);
        line-height: 0.92;
        letter-spacing: 0;
        text-align: left;
        white-space: pre;
        user-select: none;
        opacity: 0.78;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
        transition: color 180ms ease, opacity 180ms ease, filter 180ms ease;
      }

      .portrait:hover .portrait-output {
        color: #909090;
        opacity: 0.92;
        filter: contrast(1.12);
      }

      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent,
          transparent 49%,
          rgba(255, 255, 255, 0.018) 50%,
          transparent 51%,
          transparent
        );
        background-size: 100% 7px;
        mix-blend-mode: screen;
        opacity: 0.65;
        pointer-events: none;
      }

      .noise {
        position: absolute;
        inset: -80px;
        opacity: 0.01;
        background-image:
          repeating-radial-gradient(circle at 10% 20%, #fff 0 1px, transparent 1px 4px),
          repeating-radial-gradient(circle at 80% 70%, #fff 0 1px, transparent 1px 5px);
        animation: drift 18s linear infinite;
        pointer-events: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes blink {
        0%,
        45% {
          opacity: 1;
        }
        46%,
        100% {
          opacity: 0;
        }
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-48px, 32px, 0);
        }
      }

      @media (max-width: 980px) {
        body {
          overflow-y: auto;
        }

        .layout {
          display: flex;
          min-height: 100vh;
          flex-direction: column;
        }

        .terminal {
          width: 100%;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--divider);
          padding: 40px 26px 30px;
        }

        .portrait {
          min-height: 58vh;
        }

        .portrait-output {
          bottom: 72px;
          font-size: clamp(5.6px, 1.05vw, 8px);
        }
      }

      @media (max-width: 560px) {
        body {
          font-size: 14px;
        }

        .terminal {
          padding: 28px 18px 24px;
        }

        .terminal-header {
          margin-bottom: 30px;
          font-size: 12px;
        }

        .dot {
          width: 11px;
          height: 11px;
        }

        .block {
          margin-bottom: 20px;
        }

        .portrait {
          min-height: 50vh;
        }
      }
    </style>
  </head>

        function escapeHtml(value) {
          return value
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");

            await delay(index === 0 ? 90 : 12 + Math.random() * 26);

          line.classList.remove("typing-cursor");
          return block;

          commandInput.disabled = true;

          for (const entry of bootLines) {
            if (entry.kind === "spacer") {
              await delay(130);
              continue;
            }

            if (entry.kind === "command") {
              await typeCommand(entry.text);
              continue;
            }

            if (entry.kind === "note") {
              appendNote(entry.lines);
              await delay(180);
              continue;
            }

            const block = terminalLog.lastElementChild || createBlock();
            for (const line of entry.lines) {
              appendOutput(block, line, entry.html);
              scrollToBottom();
              await delay(42);
            }
          }

          commandInput.disabled = false;
          commandInput.focus({ preventScroll: true });

          const queuedCommand = new URLSearchParams(window.location.search).get("command");
          if (queuedCommand) {
            await delay(180);
            runCommand(queuedCommand);
          }
        }

        function normalizeCommand(raw) {
          return raw.trim().replace(/\s+/g, " ");
        }

        function runCommand(raw) {
          const command = normalizeCommand(raw);
          if (!command) return;

          if (command.toLowerCase() === "clear") {
            terminalLog.textContent = "";
            scrollToBottom();
            return;
          }

          const lower = command.toLowerCase();
          const key = aliases[command] || aliases[lower] || lower;
          const block = createBlock();
          const commandLine = document.createElement("div");
          commandLine.className = "command-line";
          commandLine.innerHTML = `<span class="prompt">~$</span>${escapeHtml(command)}`;
          block.append(commandLine);

          const output = replies[key] || [
            `command not found: ${escapeHtml(command)}`,
            "try `help` for available commands."
          ];

          for (const line of output) {
            appendOutput(block, line, true);
          }

          scrollToBottom();
        }

        function setupTerminalInput() {
          commandForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const command = commandInput.value;
            commandInput.value = "";
            runCommand(command);
          });

          document.addEventListener("keydown", (event) => {
            if (event.metaKey || event.ctrlKey || event.altKey) return;
            if (document.activeElement === commandInput) return;
            if (event.key.length === 1 || event.key === "/") {
              commandInput.focus();
            }
          });
        }

        function renderPortrait() {
          const rows = portraitBase.length;
          const columns = Math.max(...portraitBase.map((line) => line.length));
          const binary = "010110100101";
          const lines = portraitBase.map((source, y) => {
            let line = "";
            const padded = source.padEnd(columns, " ");
            for (let x = 0; x < columns; x += 1) {
              const char = padded[x];
              if (char === " ") {
                line += " ";
                continue;
              }

              const dx = x / columns - pointer.x;
              const dy = y / rows - pointer.y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              const hot = pointer.active && distance < 0.22;
              if (hot && (x + y + portraitFrame) % 5 === 0) {
                line += binary[(x * 3 + y + portraitFrame) % binary.length];
              } else {
                line += char;
              }
            }
            return line.replace(/\s+$/g, "");
          });

          portraitOutput.textContent = lines.join("\n");
        }

        function setupPortrait() {
          renderPortrait();

          window.setInterval(() => {
            portraitFrame += 1;
            if (pointer.active) renderPortrait();
          }, 120);

          portraitStage.addEventListener("pointermove", (event) => {
            const bounds = portraitStage.getBoundingClientRect();
            pointer = {
              active: true,
              x: (event.clientX - bounds.left) / bounds.width,
              y: (event.clientY - bounds.top) / bounds.height
            };
            renderPortrait();
          });

          portraitStage.addEventListener("pointerleave", () => {
            pointer.active = false;
            renderPortrait();
          });
        }

        setupTerminalInput();
        setupPortrait();
        bootTerminal();
      })();
    </script>
  </body>
</html>
