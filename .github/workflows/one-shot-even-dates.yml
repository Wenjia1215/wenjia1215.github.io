name: One-shot evenly space portrait dates

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Patch portrait date spacing on head branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPOSITORY"]
          branch = os.environ["BRANCH"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "portrait-date-spacing-patch",
          }

          def request_json(url, method="GET", payload=None):
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(url, data=body, headers=headers, method=method)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          index_url = f"https://api.github.com/repos/{repo}/contents/index.html?ref={branch}"
          index = request_json(index_url)
          text = base64.b64decode(index["content"]).decode("utf-8")

          old = '''      .signal-meta {
        position: absolute;
        z-index: 4;
        right: 18px;
        bottom: 16px;
        left: 18px;
        display: flex;
        justify-content: flex-end;
        gap: 18px;
        color: rgba(255, 255, 255, 0.66);
        font-size: clamp(9px, 0.62vw, 11px);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .signal-date {
        color: rgba(255, 255, 255, 0.9);
      }'''

          new = '''      .signal-meta {
        position: absolute;
        z-index: 4;
        right: 18px;
        bottom: 16px;
        left: 18px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        align-items: center;
        gap: 0;
        color: rgba(255, 255, 255, 0.66);
        font-size: clamp(9px, 0.62vw, 11px);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .signal-date {
        color: rgba(255, 255, 255, 0.9);
        text-align: center;
      }'''

          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one signal-meta CSS block, found {count}")
          text = text.replace(old, new, 1)

          update_url = f"https://api.github.com/repos/{repo}/contents/index.html"
          request_json(
              update_url,
              method="PUT",
              payload={
                  "message": "Evenly space portrait dates",
                  "content": base64.b64encode(text.encode("utf-8")).decode("ascii"),
                  "sha": index["sha"],
                  "branch": branch,
              },
          )

          marker_url = f"https://api.github.com/repos/{repo}/contents/.even-date-spacing-trigger?ref={branch}"
          marker = request_json(marker_url)
          delete_url = f"https://api.github.com/repos/{repo}/contents/.even-date-spacing-trigger"
          request_json(
              delete_url,
              method="DELETE",
              payload={
                  "message": "Remove portrait spacing trigger",
                  "sha": marker["sha"],
                  "branch": branch,
              },
          )
          PY
